# Helm values for kube-prometheus-stack
# Install: helm install monitoring prometheus-community/kube-prometheus-stack -n monitoring --create-namespace -f values-prometheus.yml

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    additionalScrapeConfigs:
      - job_name: "peopleflow-backend"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - peopleflow-prod
                - peopleflow-staging
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: ${1}:$1
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

grafana:
  enabled: true
  adminPassword: "" # Set via --set grafana.adminPassword=<password> at install time
  persistence:
    enabled: true
    size: 5Gi
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "peopleflow"
          orgId: 1
          folder: "PeopleFlow"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/peopleflow
  ingress:
    enabled: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

# Custom alert rules for PeopleFlow
additionalPrometheusRulesMap:
  peopleflow-alerts:
    groups:
      - name: peopleflow.rules
        rules:
          - alert: HighErrorRate
            expr: rate(peopleflow_http_requests_total{status=~"5.."}[5m]) > 0.1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High 5xx error rate on PeopleFlow backend"
              description: "More than 10% of requests are returning 5xx errors."
          - alert: PodNotReady
            expr: kube_pod_status_ready{namespace=~"peopleflow-.*", condition="true"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PeopleFlow pod not ready"
              description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} is not ready."
          - alert: HighMemoryUsage
            expr: container_memory_usage_bytes{namespace=~"peopleflow-.*"} / container_spec_memory_limit_bytes > 0.9
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on PeopleFlow pod"
              description: "Pod {{ $labels.pod }} memory usage is above 90%."
