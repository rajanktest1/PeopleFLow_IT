# Azure Key Vault CSI SecretProviderClass
# Mounts Key Vault secrets into pods as environment variables
# No plaintext secrets in this file — values are pulled from Azure Key Vault at runtime
#
# Prerequisites:
#   - AKS cluster with Key Vault Secrets Provider addon enabled (done via Terraform)
#   - Update <KEY_VAULT_NAME> and <IDENTITY_CLIENT_ID> from Terraform outputs:
#     terraform output key_vault_name
#     terraform output aks_kubelet_identity_client_id
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: peopleflow-secrets
  namespace: peopleflow-prod
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "<IDENTITY_CLIENT_ID>"  # From: terraform output aks_kubelet_identity_client_id
    keyvaultName: "<KEY_VAULT_NAME>"                  # From: terraform output key_vault_name
    tenantId: "<AZURE_TENANT_ID>"                     # From: az account show --query tenantId -o tsv
    objects: |
      array:
        - |
          objectName: DATABASE-URL
          objectType: secret
        - |
          objectName: JWT-SECRET
          objectType: secret
        - |
          objectName: POSTGRES-PASSWORD
          objectType: secret
  secretObjects:
    - secretName: peopleflow-app-secrets
      type: Opaque
      data:
        - objectName: DATABASE-URL
          key: DATABASE_URL
        - objectName: JWT-SECRET
          key: JWT_SECRET
        - objectName: POSTGRES-PASSWORD
          key: POSTGRES_PASSWORD
