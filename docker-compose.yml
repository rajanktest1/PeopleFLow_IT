services:
  postgres:
    image: postgres:16-alpine
    container_name: peopleflow-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: peopleflow
      POSTGRES_USER: peopleflow
      POSTGRES_PASSWORD: peopleflow123
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
