services:
  postgres:
    image: postgres:16-alpine
    container_name: peopleflow-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: peopleflow
      POSTGRES_USER: peopleflow
      POSTGRES_PASSWORD: peopleflow123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peopleflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: peopleflow-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://peopleflow:peopleflow123@postgres:5432/peopleflow
      PORT: "5000"
      JWT_SECRET: peopleflow-dev-jwt-secret
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: peopleflow-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
