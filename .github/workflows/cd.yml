name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "terraform/**"

permissions:
  id-token: write   # Required for OIDC login to Azure
  contents: read

env:
  ACR_NAME: ${{ vars.ACR_NAME }}                        # Set in GitHub repo variables
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}         # e.g. peopleflowacr.azurecr.io
  AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}        # e.g. aks-peopleflow-prod
  AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}     # e.g. rg-peopleflow-prod
  NAMESPACE: peopleflow-prod

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push backend
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/peopleflow-backend:${{ steps.meta.outputs.tag }} \
                        -t ${{ env.ACR_LOGIN_SERVER }}/peopleflow-backend:latest \
                        ./backend
          docker push ${{ env.ACR_LOGIN_SERVER }}/peopleflow-backend --all-tags

      - name: Build & push frontend
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/peopleflow-frontend:${{ steps.meta.outputs.tag }} \
                        -t ${{ env.ACR_LOGIN_SERVER }}/peopleflow-frontend:latest \
                        ./frontend
          docker push ${{ env.ACR_LOGIN_SERVER }}/peopleflow-frontend --all-tags

  deploy:
    name: Deploy to AKS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Deploy to Kubernetes
        run: |
          IMAGE_TAG=${{ needs.build-and-push.outputs.image-tag }}

          # Update backend image
          kubectl set image deployment/backend \
            backend=${{ env.ACR_LOGIN_SERVER }}/peopleflow-backend:${IMAGE_TAG} \
            -n ${{ env.NAMESPACE }}

          # Update frontend image
          kubectl set image deployment/frontend \
            frontend=${{ env.ACR_LOGIN_SERVER }}/peopleflow-frontend:${IMAGE_TAG} \
            -n ${{ env.NAMESPACE }}

          # Wait for rollouts (600s to allow for autoscaler node provisioning)
          kubectl rollout status deployment/backend -n ${{ env.NAMESPACE }} --timeout=600s || \
            (echo "=== Backend pod failures ===" && \
             kubectl describe pods -l app=backend -n ${{ env.NAMESPACE }} | grep -A5 "Warning\|Error\|Failed" && \
             exit 1)
          kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=600s || \
            (echo "=== Frontend pod failures ===" && \
             kubectl describe pods -l app=frontend -n ${{ env.NAMESPACE }} | grep -A5 "Warning\|Error\|Failed" && \
             exit 1)

      - name: Verify deployment
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== Services ==="
          kubectl get svc -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.NAMESPACE }}
