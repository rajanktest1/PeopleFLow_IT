name: CI — Lint, Test & Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "terraform/**"
      - "k8s/**"

jobs:
  backend:
    name: Backend — Install, Audit & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build Docker image (validate)
        run: docker build -t peopleflow-backend:ci .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: peopleflow-backend:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  frontend:
    name: Frontend — Install, Build & Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build Docker image (validate)
        run: docker build -t peopleflow-frontend:ci .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: peopleflow-frontend:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
